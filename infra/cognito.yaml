AWSTemplateFormatVersion: '2010-09-09'
Description: >
  social-login-starter: a Cognito user pool with Google + Apple sign-in and a
  public (secret-less) app client for use from a static website.

Parameters:
  DomainPrefix:
    Type: String
    Description: >
      Prefix for your free Cognito domain. Your sign-in URL becomes
      <prefix>.auth.<region>.amazoncognito.com. Must be globally unique,
      lowercase, letters/numbers/hyphens.
    AllowedPattern: '^[a-z0-9-]+$'
  CallbackURLs:
    Type: CommaDelimitedList
    Description: >
      Where Cognito sends users back after login, e.g.
      "http://localhost:8000/callback.html,https://yoursite.com/callback.html"
  LogoutURLs:
    Type: CommaDelimitedList
    Description: Where Cognito sends users after logout (your home page URLs).
  GoogleClientId:
    Type: String
    Description: Google OAuth client ID (from Google Cloud Console).
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth client secret.
  AppleServicesId:
    Type: String
    Description: Apple Services ID, e.g. com.yourname.web.signin.
  AppleTeamId:
    Type: String
    Description: Apple Team ID (10 chars).
  AppleKeyId:
    Type: String
    Description: Apple Key ID (10 chars).
  ApplePrivateKey:
    Type: String
    NoEcho: true
    Description: Contents of the Apple .p8 private key file (full PEM text).

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${DomainPrefix}-pool'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  GoogleProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: 'email openid profile'
      AttributeMapping:
        email: email
        name: name

  AppleProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: SignInWithApple
      ProviderType: SignInWithApple
      ProviderDetails:
        client_id: !Ref AppleServicesId
        team_id: !Ref AppleTeamId
        key_id: !Ref AppleKeyId
        private_key: !Ref ApplePrivateKey
        authorize_scopes: 'email name'
      AttributeMapping:
        email: email

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - GoogleProvider
      - AppleProvider
    Properties:
      ClientName: !Sub '${DomainPrefix}-web-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      SupportedIdentityProviders:
        - Google
        - SignInWithApple
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

Outputs:
  Region:
    Description: AWS region (for config.js -> region)
    Value: !Ref AWS::Region
  UserPoolId:
    Description: For config.js -> userPoolId
    Value: !Ref UserPool
  ClientId:
    Description: For config.js -> clientId (public, no secret)
    Value: !Ref UserPoolClient
  CognitoDomain:
    Description: For config.js -> domain
    Value: !Sub '${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  ProviderRedirectURL:
    Description: Paste this into Google AND Apple as the redirect/return URL
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/idpresponse'
