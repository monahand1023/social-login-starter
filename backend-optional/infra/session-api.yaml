AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Optional Level-2 backend for social-login-starter: validates a Cognito ID
  token and issues an httpOnly session cookie. Deploy with:
  sam build && sam deploy --guided

Parameters:
  UserPoolId:
    Type: String
  ClientId:
    Type: String
  AllowedOrigin:
    Type: String
    Description: >
      The exact origin of your website — scheme + host + port, no trailing slash
      (e.g. http://localhost:8000 or https://yoursite.com). The browser will only
      send/receive the credentialed session cookie for this one origin.

Resources:
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  SessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../session-lambda/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 10
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          CLIENT_ID: !Ref ClientId
          SESSIONS_TABLE: !Ref SessionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          # Credentialed CORS: a SPECIFIC origin is required (not '*') for the
          # browser to send/receive the httpOnly session cookie.
          AllowOrigins:
            - !Ref AllowedOrigin
          AllowMethods:
            - GET
            - POST
            - DELETE
          AllowHeaders:
            - content-type
          AllowCredentials: true

Outputs:
  SessionApiUrl:
    Description: >
      Session API base URL (POST to create, GET to check, DELETE to log out).
      Paste this into config.js as sessionApiUrl to switch the demo to
      cookie-based sessions.
    Value: !GetAtt SessionFunctionUrl.FunctionUrl
